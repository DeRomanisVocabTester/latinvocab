        function status(){var d={premium:'on',epoch:DEFAULT_EPOCH};try{var s=JSON.parse(localStorage.getItem('dr_status_v1')||'null');if(s)return{premium:(s.premium==='off'?'off':'on'),epoch:String(s.epoch||DEFAULT_EPOCH)};}catch(e){}return d;}
        function period(){var d=new Date(),m=d.getMonth()+1;return d.getFullYear()+'-'+(m<10?'0':'')+m;}
        function monthLabel(){return new Date().toLocaleDateString('en-GB',{month:'long',year:'numeric'});}
        function xmur3(s){var h=1779033703^s.length;for(var i=0;i<s.length;i++){h=Math.imul(h^s.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return function(){h=Math.imul(h^h>>>16,2246822507);h=Math.imul(h^h>>>13,3266489909);h^=h>>>16;return h>>>0;};}
        var A='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        function draw(seed,n){var r=xmur3(seed),o='';for(var i=0;i<n;i++)o+=A.charAt(r()%A.length);return o;}
        function checkOf(ep,p,serial){return draw(SALT+'|'+ep+'|'+p+'|'+serial,4);}
        function premAllowed(){return status().premium!=='off';}
        function parse(x){var n=(x||'').toUpperCase().replace(/[^A-Z0-9]/g,''); if(n.slice(0,2)==='DR') n=n.slice(2); if(n.length!==10) return null; var serial=n.slice(0,6), chk=n.slice(6); return {serial:serial, ok:(premAllowed() && chk===checkOf(status().epoch,period(),serial))};}
        function usedList(){try{return JSON.parse(localStorage.getItem(USED)||'[]');}catch(e){return [];}}
        function isUsed(s){return usedList().indexOf(s)>=0;}
        function burn(s){var a=usedList(); if(a.indexOf(s)<0){a.push(s); try{localStorage.setItem(USED,JSON.stringify(a));}catch(e){}}}
        function isPrem(){try{ if(!premAllowed()) return false; var s=JSON.parse(localStorage.getItem(PP)||'null'); return !!s && s.period===period() && s.epoch===status().epoch; }catch(e){return false;}}

        var scrim=$('drup-scrim'), modal=$('drup-modal');
        function openM(h){modal.innerHTML=h; scrim.style.display='flex'; requestAnimationFrame(function(){scrim.classList.add('show');});}
        function closeM(){scrim.classList.remove('show'); setTimeout(function(){scrim.style.display='none';},240);}
        scrim.addEventListener('click',function(e){ if(e.target===scrim) closeM(); });
        document.addEventListener('keydown',function(e){ if(e.key==='Escape' && scrim.style.display==='flex') closeM(); });

        function upgrade(){
          if(!premAllowed()){
            openM('<div class="drup-seal">\u2726</div><div class="drup-kick">De Romanis Premium</div><h2 class="drup-h2">Premium is paused</h2><p class="drup-p">The full edition is switched off at the moment \u2014 everyone\u2019s on the free edition. Do check back later.</p><button id="drup-x" class="drup-cta drup-dark">OK</button>');
            $('drup-x').onclick=closeM; return;
          }
          openM(
            '<div class="drup-seal">\u2726</div>'+
            '<div class="drup-kick">De Romanis Premium</div>'+
            '<h2 class="drup-h2">Enter your code</h2>'+
            '<p class="drup-p">Premium unlocks spaced-repetition, the progress dashboard, the Interlect tutor, themes and the hidden arcade \u2014 for <b>'+monthLabel()+'</b>. Each code works once; a fresh one is needed every month.</p>'+
            '<input id="drup-key" class="drup-input" type="text" spellcheck="false" autocapitalize="characters" autocomplete="off" placeholder="DR-XXXXXX-XXXX">'+
            '<div id="drup-err" class="drup-err"></div>'+
            '<button id="drup-go" class="drup-cta">Unlock for '+monthLabel()+'</button>'+
            '<button id="drup-x" class="drup-link">Maybe later</button>'+
            '<div class="drup-fine">Your unlock is stored only in this browser. Codes are single-use and change on the 1st of each month.</div>'
          );
          $('drup-key').focus();
          function go(){
            var v=$('drup-key').value||'';
            var r=parse(v);
            if(!r||!r.ok){ $('drup-err').textContent='That code isn\u2019t valid for '+monthLabel()+'. Codes change monthly \u2014 make sure you\u2019re using this month\u2019s.'; return; }
            if(isUsed(r.serial)){ $('drup-err').textContent='This code has already been used on this device. Ask for a fresh one.'; return; }
            burn(r.serial);
            try{localStorage.setItem(PP,JSON.stringify({period:period(),epoch:status().epoch}));}catch(e){}
            location.reload();
          }
          $('drup-go').onclick=go;
          $('drup-key').addEventListener('keydown',function(e){ if(e.key==='Enter') go(); });
          $('drup-x').onclick=closeM;
        }
        function manage(){
          openM(
            '<div class="drup-seal">\u2713</div>'+
            '<div class="drup-kick">Premium active</div>'+
            '<h2 class="drup-h2">Unlocked for '+monthLabel()+'</h2>'+
            '<p class="drup-p">Every study tool and extra is switched on. Your code lasts until the end of this month; next month you\u2019ll enter a fresh one.</p>'+
            '<button id="drup-done" class="drup-cta drup-dark">Done</button>'+
            '<button id="drup-rm" class="drup-link">Lock again &amp; return to Free</button>'
          );
          $('drup-done').onclick=closeM;
          $('drup-rm').onclick=function(){ try{localStorage.removeItem(PP);}catch(e){} location.reload(); };
        }
        function reveal(){ isPrem()?manage():upgrade(); }

        /* ---- entry points that DON'T add any blocking overlay ---- */
        // Konami on keyboard, always available
        var seq=[38,38,40,40,37,39,37,39,66,65], pos=0;
        document.addEventListener('keydown',function(e){
          pos=(e.keyCode===seq[pos])?pos+1:(e.keyCode===seq[0]?1:0);
          if(pos===seq.length){ pos=0; reveal(); }
        });

        var wm=$('watermark');
        if(isPrem()){
          // small seal, bottom-right just ABOVE the watermark (app's own safe corner) -> manage
          if(!$('drup-seal-btn')){
            var b=document.createElement('div'); b.id='drup-seal-btn'; b.title='De Romanis Premium'; b.textContent='\u2726';
            document.body.appendChild(b); b.addEventListener('click',manage);
          }
        } else if(wm){
          // FREE: tap the "Samuel Cai" watermark 7x to reveal the code box (no overlay added)
          var taps=0, t0=0;
          wm.style.cursor='pointer';
          wm.addEventListener('click',function(){ var now=Date.now(); if(now-t0>2500) taps=0; t0=now; taps++; if(taps>=7){ taps=0; upgrade(); } });
        }
      }catch(e){}
    }

    var CSS="<style>"+
      "#drup-seal-btn{position:fixed;right:12px;bottom:40px;z-index:2147483000;display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.85rem;color:#5a4710;background:linear-gradient(180deg,#f4ecd8,#e7dcc2);border:1px solid #cdbf9a;box-shadow:0 8px 20px -12px rgba(0,0,0,.5);opacity:.9;}"+
      "#drup-seal-btn:hover{opacity:1;filter:brightness(1.04);}"+
      "#drup-scrim{position:fixed;inset:0;z-index:2147483001;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(28,22,12,.55);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);opacity:0;transition:opacity .25s ease;}"+
      "#drup-scrim.show{opacity:1;}"+
      "#drup-modal{width:100%;max-width:420px;background:linear-gradient(180deg,#f6f0e2,#efe7d3);border:1px solid #d8ccae;border-radius:14px;padding:24px 22px;text-align:center;box-shadow:0 40px 90px -40px rgba(0,0,0,.7);transform:translateY(12px) scale(.98);transition:transform .28s cubic-bezier(.22,.61,.36,1);font-family:'Spectral',Georgia,serif;color:#221c12;max-height:92vh;overflow:auto;}"+
      "#drup-scrim.show #drup-modal{transform:none;}"+
      ".drup-seal{width:44px;height:44px;margin:0 auto 10px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#3a2c0c;background:linear-gradient(180deg,#d8b75a,#a9842c);box-shadow:0 8px 22px -10px rgba(120,90,20,.9);}"+
      ".drup-kick{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:#937327;font-weight:600;margin-bottom:6px;}"+
      ".drup-h2{font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:1.62rem;margin:0 0 8px;}"+
      ".drup-p{color:#776b54;font-size:.92rem;line-height:1.5;margin:0 0 16px;}"+
      ".drup-input{width:100%;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:1.02rem;letter-spacing:.12em;text-align:center;text-transform:uppercase;padding:13px;border:1px solid #d8ccae;border-radius:7px;background:#fff;color:#221c12;outline:none;}"+
      ".drup-input:focus{border-color:#8a2b20;box-shadow:0 0 0 3px rgba(138,43,32,.12);}"+
      ".drup-err{color:#8a2b20;font-size:.82rem;min-height:1.1em;margin:8px 2px 0;text-align:left;}"+
      ".drup-cta{width:100%;margin-top:14px;font-family:'Spectral',Georgia,serif;font-size:1rem;font-weight:600;cursor:pointer;color:#f6f0e2;background:#8a2b20;border:1px solid #6f2017;border-radius:6px;padding:13px;transition:background .15s ease;}"+
      ".drup-cta:hover{background:#6f2017;}.drup-cta.drup-dark{background:#221c12;border-color:#221c12;}"+
      ".drup-link{display:block;margin:12px auto 0;background:none;border:0;color:#776b54;font-family:'Spectral',Georgia,serif;font-size:.86rem;cursor:pointer;text-decoration:underline;text-underline-offset:3px;}"+
      ".drup-link:hover{color:#8a2b20;}"+
      ".drup-fine{margin-top:14px;font-size:.74rem;color:#a89a7e;line-height:1.45;}"+
      "</style>";
    var SCRIM='<div id="drup-scrim"><div id="drup-modal"></div></div>';
    var OVERLAY=CSS+SCRIM+"<script>("+drupRuntime.toString()+")();<\/script>";

    function decodeB64UTF8(b64){
      var bin=atob(b64.replace(/\s+/g,''));
      var by=new Uint8Array(bin.length);
      for(var i=0;i<bin.length;i++) by[i]=bin.charCodeAt(i);
      return new TextDecoder('utf-8').decode(by);
    }
    function build(){
      return getStatus().then(function(st){
        try{localStorage.setItem('dr_status_v1',JSON.stringify(st));}catch(e){}
        var prem=false;
        try{
          if(st.premium!=='off'){
            var s=JSON.parse(localStorage.getItem(PP)||'null');
            var d=new Date(),m=d.getMonth()+1,p=d.getFullYear()+'-'+(m<10?'0':'')+m;
            prem=!!s && s.period===p && s.epoch===st.epoch;
          }
        }catch(e){}
        var html=decodeB64UTF8(document.getElementById(prem?'premB64':'freeB64').textContent);
        if(/<\/body>/i.test(html)) html=html.replace(/<\/body>/i,function(){return OVERLAY+'</body>';});
        else html+=OVERLAY;
        document.open(); document.write(html); document.close();
      });
    }
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',build);
    else build();
  })();
  </script>
</body>
</html>
