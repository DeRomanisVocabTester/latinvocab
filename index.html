  <script>
  (function(){
    /* ===== De Romanis — encrypted premium, permanent unlock, named codes =====
       The premium edition is AES-GCM ciphertext; a code unwraps the master key
       via PBKDF2 (200k rounds). A code may carry the owner's name, signed with
       the master key so it cannot be altered. */
    var MK='__dromanis_mk_v4', OWNER='__dromanis_owner_v4';
    var STATUS_URL='';

    /* --- capture payloads NOW: document.write() later replaces the DOM --- */
    function grab(id){var e=document.getElementById(id);return e?e.textContent.replace(/\s+/g,''):'';}
    var ENC=grab('premEnc'), KEYS=grab('premKeys'), FREE=grab('freeB64');

    function b2a(s){var b=atob(s),a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
    function a2b(u){var s='';for(var i=0;i<u.length;i++)s+=String.fromCharCode(u[i]);return btoa(s);}
    function sc(){return (window.crypto&&window.crypto.subtle)?window.crypto.subtle:null;}
    var A='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';

    function parseCode(raw){
      var n=String(raw||'').replace(/[^A-Za-z0-9]/g,'').toUpperCase();
      if(n.slice(0,2)==='DR') n=n.slice(2);
      if(n.length<13) return null;
      var core=n.slice(0,13), rest=n.slice(13), name='', mac='';
      if(rest.length>=5){ mac=rest.slice(-4); name=rest.slice(0,-4); }
      else if(rest.length) return null;
      var a=A.indexOf(core[0]),b=A.indexOf(core[1]),c=A.indexOf(core[2]);
      if(a<0||b<0||c<0) return null;
      return {core:core, idx:a*1024+b*32+c, name:name, mac:mac, pw:'DR'+core};
    }
    function mac4(bytes){var v=(bytes[0]<<16)|(bytes[1]<<8)|bytes[2],s='';for(var i=0;i<4;i++)s+=A.charAt((v>>>(19-i*5))&31);return s;}
    function signName(mk,core,name){
      var s=sc(); if(!s) return Promise.resolve('');
      return s.importKey('raw',mk,{name:'HMAC',hash:'SHA-256'},false,['sign'])
        .then(function(k){return s.sign('HMAC',k,new TextEncoder().encode(core+'|'+name));})
        .then(function(sig){return mac4(new Uint8Array(sig));})
        .catch(function(){return '';});
    }
    function unwrap(p){
      var s=sc(); if(!s) return Promise.resolve(null);
      var blob; try{ blob=JSON.parse(KEYS); }catch(e){ return Promise.resolve(null); }
      if(!blob.pk[p.idx]) return Promise.resolve(null);
      var pk=blob.pk[p.idx];
      return s.importKey('raw',new TextEncoder().encode(p.pw),{name:'PBKDF2'},false,['deriveKey'])
        .then(function(base){return s.deriveKey({name:'PBKDF2',salt:b2a(pk.s),iterations:blob.it||200000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);})
        .then(function(kek){return s.decrypt({name:'AES-GCM',iv:b2a(pk.v)},kek,b2a(pk.c));})
        .then(function(raw){return new Uint8Array(raw);})
        .catch(function(){return null;});
    }
    function decryptPremium(mk){
      var s=sc(); if(!s||!mk) return Promise.resolve(null);
      var blob; try{ blob=JSON.parse(KEYS); }catch(e){ return Promise.resolve(null); }
      return s.importKey('raw',mk,{name:'AES-GCM'},false,['decrypt'])
        .then(function(k){return s.decrypt({name:'AES-GCM',iv:b2a(blob.iv)},k,b2a(ENC));})
        .then(function(buf){return new TextDecoder('utf-8').decode(buf);})
        .catch(function(){return null;});
    }
    function savedKey(){try{var v=localStorage.getItem(MK);return v?b2a(v):null;}catch(e){return null;}}
    function owner(){try{return localStorage.getItem(OWNER)||'';}catch(e){return '';}}

    function statusAllows(){
      if(!STATUS_URL) return Promise.resolve(true);
      return new Promise(function(res){
        var done=false,to=setTimeout(function(){if(!done){done=true;res(true);}},1600);
        try{ fetch(STATUS_URL+(STATUS_URL.indexOf('?')<0?'?':'&')+'t='+Date.now(),{cache:'no-store'})
          .then(function(r){return r.json();})
          .then(function(j){if(done)return;done=true;clearTimeout(to);res(!(j&&j.premium==='off'));})
          .catch(function(){if(done)return;done=true;clearTimeout(to);res(true);});
        }catch(e){if(!done){done=true;clearTimeout(to);res(true);}}
      });
    }

    /* ---- API for the injected overlay ---- */
    // check a code: resolves {ok, name} without committing anything
    window.__drupCheck=function(raw){
      var p=parseCode(raw);
      if(!p) return Promise.resolve({ok:false});
      return unwrap(p).then(function(mk){
        if(!mk) return {ok:false};
        if(!p.name) return {ok:true,name:'',mk:mk};
        return signName(mk,p.core,p.name).then(function(sig){
          if(!sig || sig!==p.mac) return {ok:false,altered:true};
          return {ok:true,name:p.name,mk:mk};
        });
      });
    };
    // commit an accepted code
    window.__drupCommit=function(res){
      return decryptPremium(res.mk).then(function(html){
        if(!html) return false;
        try{ localStorage.setItem(MK,a2b(res.mk)); if(res.name) localStorage.setItem(OWNER,res.name); }catch(e){}
        return true;
      });
    };
    window.__drupLock=function(){try{localStorage.removeItem(MK);localStorage.removeItem(OWNER);}catch(e){}};

    function drupRuntime(){
      try{
        if(window.__drup) return; window.__drup=1;
        var $=function(i){return document.getElementById(i);};
        var scrim=$('drup-scrim'), modal=$('drup-modal');
        function openM(h){modal.innerHTML=h;scrim.style.display='flex';requestAnimationFrame(function(){scrim.classList.add('show');});}
        function closeM(){scrim.classList.remove('show');setTimeout(function(){scrim.style.display='none';},240);}
        scrim.addEventListener('click',function(e){if(e.target===scrim)closeM();});
        document.addEventListener('keydown',function(e){if(e.key==='Escape'&&scrim.style.display==='flex')closeM();});

        function confirmWho(res){
          openM('<div class="drup-seal">\u2726</div><div class="drup-kick">Confirm your licence</div>'+
            '<h2 class="drup-h2">Is this you?</h2>'+
            '<p class="drup-p">This code was issued to:</p>'+
            '<div class="drup-name">'+res.name+'</div>'+
            '<button id="drup-yes" class="drup-cta">Yes, that\u2019s me \u2014 unlock</button>'+
            '<button id="drup-no" class="drup-link">No, that isn\u2019t me</button>');
          $('drup-yes').onclick=function(){
            var b=$('drup-yes'); b.disabled=true; b.textContent='Unlocking\u2026';
            window.__drupCommit(res).then(function(ok){ if(ok) location.reload(); else { b.disabled=false; b.textContent='Yes, that\u2019s me \u2014 unlock'; } });
          };
          $('drup-no').onclick=function(){ unlockBox('That code belongs to someone else \u2014 ask for your own.'); };
        }
        function unlockBox(err){
          openM('<div class="drup-seal">\u2726</div><div class="drup-kick">De Romanis Premium</div>'+
            '<h2 class="drup-h2">Enter your code</h2>'+
            '<p class="drup-p">One code, unlocked for good \u2014 spaced repetition, the progress dashboard, the Interlect tutor, themes and the hidden arcade. No renewals.</p>'+
            '<input id="drup-key" class="drup-input" type="text" spellcheck="false" autocapitalize="characters" autocomplete="off" placeholder="DR-XXX-XXXXX-XXXXX">'+
            '<div id="drup-err" class="drup-err">'+(err||'')+'</div>'+
            '<button id="drup-go" class="drup-cta">Unlock Premium</button>'+
            '<button id="drup-x" class="drup-link">Maybe later</button>'+
            '<div class="drup-fine">Checking takes a moment \u2014 that pause is deliberate, it is what stops codes being guessed.</div>');
          $('drup-key').focus();
          function go(){
            var v=($('drup-key').value||'').trim();
            var b=$('drup-go'); b.disabled=true; b.textContent='Checking\u2026'; $('drup-err').textContent='';
            window.__drupCheck(v).then(function(res){
              if(!res.ok){
                b.disabled=false; b.textContent='Unlock Premium';
                $('drup-err').textContent = res.altered ? 'That code has been altered and cannot be used.' : 'That code was not accepted. Check for typos \u2014 letters and numbers only.';
                return;
              }
              if(res.name){ confirmWho(res); return; }
              window.__drupCommit(res).then(function(ok){ if(ok) location.reload(); else { b.disabled=false; b.textContent='Unlock Premium'; $('drup-err').textContent='Could not unlock \u2014 please try again.'; } });
            });
          }
          $('drup-go').onclick=go;
          $('drup-key').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
          $('drup-x').onclick=closeM;
        }
        function manageBox(){
          var who=window.__drupOwner||'';
          openM('<div class="drup-seal">\u2713</div><div class="drup-kick">Premium active</div>'+
            '<h2 class="drup-h2">Unlocked</h2>'+
            (who?'<p class="drup-p">Licensed to</p><div class="drup-name">'+who+'</div>':'')+
            '<p class="drup-p">Everything is switched on, permanently on this device. No monthly code needed.</p>'+
            '<button id="drup-done" class="drup-cta drup-dark">Done</button>'+
            '<button id="drup-rm" class="drup-link">Lock again &amp; return to Free</button>');
          $('drup-done').onclick=closeM;
          $('drup-rm').onclick=function(){window.__drupLock();location.reload();};
        }
        var prem=!!window.__drupPrem;
        var seq=[38,38,40,40,37,39,37,39,66,65],pos=0;
        document.addEventListener('keydown',function(e){
          pos=(e.keyCode===seq[pos])?pos+1:(e.keyCode===seq[0]?1:0);
          if(pos===seq.length){pos=0; prem?manageBox():unlockBox();}
        });
        if(prem){
          var b=document.createElement('div');b.id='drup-seal-btn';b.textContent='\u2726';b.title='Premium';
          document.body.appendChild(b); b.addEventListener('click',manageBox);
        } else {
          var wm=$('watermark');
          if(wm){var t=0,l=0;wm.style.cursor='pointer';
            wm.addEventListener('click',function(){var n=Date.now();if(n-l>2500)t=0;l=n;t++;if(t>=7){t=0;unlockBox();}});}
        }
      }catch(e){}
    }

    var CSS="<style>"+
      "#drup-seal-btn{position:fixed;right:12px;bottom:40px;z-index:2147483000;display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.85rem;color:#5a4710;background:linear-gradient(180deg,#f4ecd8,#e7dcc2);border:1px solid #cdbf9a;box-shadow:0 8px 20px -12px rgba(0,0,0,.5);opacity:.9;}"+
      "#drup-scrim{position:fixed;inset:0;z-index:2147483001;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(28,22,12,.55);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);opacity:0;transition:opacity .25s ease;}"+
      "#drup-scrim.show{opacity:1;}"+
      "#drup-modal{width:100%;max-width:420px;background:linear-gradient(180deg,#f6f0e2,#efe7d3);border:1px solid #d8ccae;border-radius:14px;padding:24px 22px;text-align:center;box-shadow:0 40px 90px -40px rgba(0,0,0,.7);transform:translateY(12px) scale(.98);transition:transform .28s cubic-bezier(.22,.61,.36,1);font-family:'Spectral',Georgia,serif;color:#221c12;max-height:92vh;overflow:auto;}"+
      "#drup-scrim.show #drup-modal{transform:none;}"+
      ".drup-seal{width:44px;height:44px;margin:0 auto 10px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#3a2c0c;background:linear-gradient(180deg,#d8b75a,#a9842c);}"+
      ".drup-kick{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:#937327;font-weight:600;margin-bottom:6px;}"+
      ".drup-h2{font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:1.62rem;margin:0 0 8px;}"+
      ".drup-p{color:#776b54;font-size:.92rem;line-height:1.5;margin:0 0 12px;}"+
      ".drup-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.5rem;letter-spacing:.08em;color:#8a2b20;margin:0 0 16px;}"+
      ".drup-input{width:100%;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:1rem;letter-spacing:.1em;text-align:center;text-transform:uppercase;padding:13px;border:1px solid #d8ccae;border-radius:7px;background:#fff;color:#221c12;outline:none;}"+
      ".drup-input:focus{border-color:#8a2b20;box-shadow:0 0 0 3px rgba(138,43,32,.12);}"+
      ".drup-err{color:#8a2b20;font-size:.82rem;min-height:1.1em;margin:8px 2px 0;text-align:left;}"+
      ".drup-cta{width:100%;margin-top:14px;font-family:'Spectral',Georgia,serif;font-size:1rem;font-weight:600;cursor:pointer;color:#f6f0e2;background:#8a2b20;border:1px solid #6f2017;border-radius:6px;padding:13px;}"+
      ".drup-cta:disabled{opacity:.7;}.drup-cta.drup-dark{background:#221c12;border-color:#221c12;}"+
      ".drup-link{display:block;margin:12px auto 0;background:none;border:0;color:#776b54;font-family:'Spectral',Georgia,serif;font-size:.86rem;cursor:pointer;text-decoration:underline;text-underline-offset:3px;}"+
      ".drup-fine{margin-top:14px;font-size:.74rem;color:#a89a7e;line-height:1.45;}"+
      "</style>";
    var SCRIM='<div id="drup-scrim"><div id="drup-modal"></div></div>';
    function overlay(prem){
      return CSS+SCRIM+"<script>window.__drupPrem="+(prem?'true':'false')+";window.__drupOwner="+JSON.stringify(owner())+";("+drupRuntime.toString()+")();<\/script>";
    }
    function writeDoc(html,prem){
      var ov=overlay(prem);
      if(/<\/body>/i.test(html)) html=html.replace(/<\/body>/i,function(){return ov+'</body>';});
      else html+=ov;
      document.open(); document.write(html); document.close();
    }
    function freeHTML(){ return new TextDecoder('utf-8').decode(b2a(FREE)); }

    function build(){
      statusAllows().then(function(allowed){
        var mk=allowed?savedKey():null;
        if(!mk){ writeDoc(freeHTML(),false); return; }
        decryptPremium(mk).then(function(html){ html?writeDoc(html,true):writeDoc(freeHTML(),false); });
      });
    }
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',build);
    else build();
  })();
  </script>
</body>
</html>
